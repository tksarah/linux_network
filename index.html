<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlmaLinux Network Lab</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-terminal-mode="dock">
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">AlmaLinux / NetworkManager</p>
          <h1>Linuxネットワーク体験シミュレーター</h1>
        </div>
        <div class="header-actions">
          <button id="reset-state" class="button secondary" type="button">リセット</button>
          <button id="show-help" class="button" type="button">コマンド一覧</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="lesson-panel" aria-label="演習と教材">
          <section class="panel-section">
            <h2>演習</h2>
            <div id="scenario-list" class="scenario-list"></div>
          </section>

          <section class="panel-section">
            <h2>この演習の進め方</h2>
            <div id="exercise-guide" class="exercise-guide"></div>
          </section>

          <section class="panel-section">
            <h2>よく使うコマンド</h2>
            <div id="command-chips" class="command-chips"></div>
          </section>
        </aside>

        <aside class="state-panel" aria-label="状態と設定ファイル">
          <section class="panel-section topology-section">
            <h2>仮想ネットワーク</h2>
            <div id="topology-map" class="topology-map" aria-live="polite"></div>
          </section>

          <section class="panel-section">
            <h2>現在の状態</h2>
            <dl id="state-summary" class="state-summary"></dl>
          </section>

          <section class="panel-section">
            <h2>達成状況</h2>
            <div id="goal-list" class="goal-list"></div>
          </section>

          <section class="panel-section files-section">
            <h2>設定ファイル</h2>
            <div id="file-list" class="file-list"></div>
            <div id="file-explainer" class="file-explainer"></div>
          </section>
        </aside>
      </main>

      <section id="terminal-panel" class="terminal-panel" aria-label="CLIシミュレーター">
        <div class="terminal-toolbar">
          <div class="terminal-title">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="active-scenario-label">基本操作</span>
          </div>
          <div class="terminal-hint">入力して Enter</div>
          <div class="terminal-actions" aria-label="ターミナル表示">
            <button id="terminal-dock" class="terminal-icon-button" type="button" title="下部に固定" aria-label="下部に固定">
              <span aria-hidden="true">▁</span>
            </button>
            <button id="terminal-expand" class="terminal-icon-button" type="button" title="広げて表示" aria-label="広げて表示">
              <span aria-hidden="true">□</span>
            </button>
            <button id="terminal-minimize" class="terminal-icon-button" type="button" title="最小化" aria-label="最小化">
              <span aria-hidden="true">-</span>
            </button>
          </div>
        </div>
        <div id="terminal-output" class="terminal-output" aria-live="polite"></div>
        <form id="terminal-form" class="terminal-form">
          <label for="terminal-input" class="prompt">[student@alma-lab ~]$</label>
          <input id="terminal-input" name="command" autocomplete="off" spellcheck="false" autofocus>
          <button class="terminal-submit" type="submit" title="コマンドを実行" aria-label="コマンドを実行">実行</button>
        </form>
      </section>
    </div>

    <template id="welcome-template">
AlmaLinux Network Lab へようこそ。
このCLIはブラウザ内の仮想環境です。実OSの設定は変更しません。

まずは次の順で触ってみてください。
  nmcli device status
  nmcli connection show
  cat /etc/NetworkManager/system-connections/ens160.nmconnection
  ip addr
  ip route
  ping 192.168.10.1

困ったら help を入力できます。
    </template>

    <script type="module" src="assets/app.js"></script>
  </body>
</html>
